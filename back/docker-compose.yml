services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: seguro-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Seguro@12345"
      SA_PASSWORD: "Seguro@12345"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Seguro@12345 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: seguro-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  proposta-api:
    build:
      context: .
      dockerfile: src/PropostaService/PropostaService.Api/Dockerfile
    container_name: proposta-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=SeguroPropostaDb;User Id=sa;Password=Seguro@12345;TrustServerCertificate=True;Encrypt=False"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  contratacao-api:
    build:
      context: .
      dockerfile: src/ContratacaoService/ContratacaoService.Api/Dockerfile
    container_name: contratacao-api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=SeguroContratacaoDb;User Id=sa;Password=Seguro@12345;TrustServerCertificate=True;Encrypt=False"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
